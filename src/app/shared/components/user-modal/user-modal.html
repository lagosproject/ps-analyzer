<div class="modal-overlay" (click)="cancel()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <div class="header-icon">
        <span class="material-symbols-outlined">person_add</span>
      </div>
      <div class="header-text">
        <h2 class="modal-title">{{ 'userModal.title' | translate }}</h2>
        <p class="modal-subtitle">{{ 'userModal.subtitle' | translate }}</p>
      </div>
      <button class="close-btn" (click)="cancel()" [attr.aria-label]="'common.close' | translate">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="modal-body">
      <div class="input-group">
        <label for="username">{{ 'userModal.yourName' | translate }}</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">account_circle</span>
          <input 
            type="text" 
            id="username" 
            [(ngModel)]="tempName" 
            [placeholder]="'appConfig.yourName' | translate" 
            (keyup.enter)="save()"
           
          >
        </div>
        <small>{{ 'userModal.nameDescription' | translate }}</small>
      </div>
    </div>

    <footer class="modal-footer">
      <button class="btn-ghost" (click)="cancel()">{{ 'common.cancel' | translate }}</button>
      <button class="btn-primary" [disabled]="!tempName().trim()" (click)="save()">
        <span>{{ 'userModal.confirmName' | translate }}</span>
        <span class="material-symbols-outlined">check_circle</span>
      </button>
    </footer>
  </div>
</div>

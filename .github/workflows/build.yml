name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      # --- SIDECAR BINARY PREPARATION ---
      
      - name: Get Sidecar Binaries (Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          mkdir -p src-tauri/binaries
          # Tracy
          curl -L https://github.com/gear-genomics/tracy/releases/download/v0.8.9/tracy-v0.8.9-linux-amd64 -o src-tauri/binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu
          
          # Samtools & Bgzip
          sudo apt-get update
          sudo apt-get install -y samtools tabix
          cp $(which samtools) src-tauri/binaries/ps-analyzer-samtools-x86_64-unknown-linux-gnu
          cp $(which bgzip) src-tauri/binaries/ps-analyzer-bgzip-x86_64-unknown-linux-gnu
          
          # Bio-Engine
          curl -L https://github.com/lagosproject/bio-engine/releases/latest/download/bio-engine-${{ matrix.platform }} -o src-tauri/binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu

      - name: setup msys2 (Windows)
        uses: msys2/setup-msys2@v2
        if: matrix.platform == 'windows-latest'
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-samtools
            mingw-w64-x86_64-htslib

      - name: Get Sidecar Binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir -p src-tauri/binaries
          
          # Copy from MSYS2 (using local paths relative to MSYS2 root)
          cp /mingw64/bin/samtools.exe src-tauri/binaries/ps-analyzer-samtools-x86_64-pc-windows-msvc.exe
          cp /mingw64/bin/bgzip.exe src-tauri/binaries/ps-analyzer-bgzip-x86_64-pc-windows-msvc.exe
          
          # Include necessary DLLs for MSYS2 binaries
          cp /mingw64/bin/zlib1.dll src-tauri/binaries/
          cp /mingw64/bin/libwinpthread-1.dll src-tauri/binaries/
          cp /mingw64/bin/libbz2-1.dll src-tauri/binaries/
          cp /mingw64/bin/liblzma-5.dll src-tauri/binaries/
          # Optional but recommended for samtools
          cp /mingw64/bin/libcurl-4.dll src-tauri/binaries/ || true
          cp /mingw64/bin/libcrypto-3-x64.dll src-tauri/binaries/ || true
          cp /mingw64/bin/libssl-3-x64.dll src-tauri/binaries/ || true
          
          # Bio-Engine
          curl -L https://github.com/lagosproject/bio-engine/releases/latest/download/bio-engine.exe -o src-tauri/binaries/ps-analyzer-bio-engine-x86_64-pc-windows-msvc.exe
          
          # Tracy (Dynamic latest version)
          LATEST_TRACY_URL=$(curl -s https://api.github.com/repos/gear-genomics/tracy/releases/latest | grep "browser_download_url.*windows-amd64" | cut -d '"' -f 4)
          curl -L "$LATEST_TRACY_URL" -o src-tauri/binaries/ps-analyzer-tracy-x86_64-pc-windows-msvc.exe

      # --- TAURI BUILD ---

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Matches standard vX.Y.Z format
          releaseId: ${{ github.event.release.id }}
          releaseName: "PS Analyzer v__VERSION__"
          releaseBody: "Automated release from GitHub Actions. Includes Bundled and Minimal versions (Linux)."
          releaseDraft: false
          prerelease: false

  build-minimal:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev jq

      - name: install frontend dependencies
        run: npm install

      - name: Prepare Minimal Config (Remove Samtools/Bgzip sidecars)
        run: |
          # Use jq to remove samtools and bgzip from externalBin
          # Also change the product name to distinguish the bundle
          jq '.bundle.externalBin |= map(select(contains("samtools") == false and contains("bgzip") == false)) | .productName = "PS Analyzer Minimal"' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      - name: Get Core Sidecar Binaries (Bio-Engine)
        run: |
          mkdir -p src-tauri/binaries
          # Bio-Engine
          curl -L https://github.com/lagosproject/bio-engine/releases/latest/download/bio-engine-ubuntu-22.04 -o src-tauri/binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu
          
          # Tracy
          curl -L https://github.com/gear-genomics/tracy/releases/download/v0.8.9/tracy-v0.8.9-linux-amd64 -o src-tauri/binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseId: ${{ github.event.release.id }}
          releaseName: "PS Analyzer v__VERSION__"
          releaseBody: "Automated release from GitHub Actions. Includes Bundled and Minimal versions (Linux)."
          releaseDraft: false
          prerelease: false

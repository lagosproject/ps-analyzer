name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: Prepare Config (Remove Bgzip and Samtools on Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
           sudo apt-get update && sudo apt-get install -y jq
           jq '.bundle.externalBin |= map(select(contains("bgzip") == false and contains("samtools") == false))' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

      # --- SIDECAR BINARY PREPARATION ---
      
      - name: Get Sidecar Binaries (Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/dummy.txt
          touch src-tauri/binaries/dummy.dll
          # Tracy
          curl -L https://github.com/gear-genomics/tracy/releases/download/v0.8.9/tracy-v0.8.9-linux-amd64 -o src-tauri/binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu
          
          # Bio-Engine
          curl -L https://github.com/lagosproject/bio-engine/releases/latest/download/bio-engine-x86_64-unknown-linux-gnu -o src-tauri/binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu

      - name: setup msys2 (Windows)
        uses: msys2/setup-msys2@v2
        if: matrix.platform == 'windows-latest'
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-htslib
            mingw-w64-x86_64-samtools

      - name: Prepare Binary Directory (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p src-tauri/binaries
          echo "dummy" > src-tauri/binaries/dummy.txt
          echo "dummy" > src-tauri/binaries/dummy.dll

      - name: Get Sidecar Binaries (Windows)
        if: matrix.platform == 'windows-latest'
        shell: msys2 {0}
        run: |
          # Copy from MSYS2 (using local paths relative to MSYS2 root)
          cp /mingw64/bin/bgzip.exe src-tauri/binaries/ps-analyzer-bgzip-x86_64-pc-windows-msvc.exe
          cp /mingw64/bin/samtools.exe src-tauri/binaries/ps-analyzer-samtools-x86_64-pc-windows-msvc.exe
          
          # Automated discovery of all MinGW DLL dependencies
          # We check both bgzip and samtools to capture all transient requirements
          for bin in src-tauri/binaries/*.exe; do
            echo "Identifying dependencies for $bin..."
            ldd "$bin" | grep /mingw64/bin/ | awk '{print $3}' | xargs -I {} cp -v {} src-tauri/binaries/
          done
          
          # Tracy (Dynamic latest version)
          LATEST_TRACY_URL=$(curl -s https://api.github.com/repos/gear-genomics/tracy/releases/latest | grep "browser_download_url.*windows-amd64" | cut -d '"' -f 4)
          curl -L "$LATEST_TRACY_URL" -o src-tauri/binaries/ps-analyzer-tracy-x86_64-pc-windows-msvc.exe
          
          # Bio-Engine
          curl -L https://github.com/lagosproject/bio-engine/releases/latest/download/bio-engine-x86_64-pc-windows-msvc.exe -o src-tauri/binaries/ps-analyzer-bio-engine-x86_64-pc-windows-msvc.exe
          
          echo "Final contents of binaries folder:"
          ls -F src-tauri/binaries/

      - name: Smoke Test Sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          echo "Verifying bgzip sidecar..."
          ./src-tauri/binaries/ps-analyzer-bgzip-x86_64-pc-windows-msvc.exe --version
          
          echo "Verifying tracy sidecar..."
          ./src-tauri/binaries/ps-analyzer-tracy-x86_64-pc-windows-msvc.exe --version
          
          echo "Verifying bio-engine sidecar..."
          ./src-tauri/binaries/ps-analyzer-bio-engine-x86_64-pc-windows-msvc.exe --help

      # --- TAURI BUILD ---

      - name: build tauri app
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Matches standard vX.Y.Z format
          releaseId: ${{ github.event.release.id }}
          releaseName: "PS Analyzer v__VERSION__"
          releaseBody: "Automated release from GitHub Actions. Optimized Linux bundle (no bgzip sidecar)."
          releaseDraft: false
          prerelease: false

      - name: Get Version (from tauri.conf.json)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Package Portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $Version = $env:PACKAGE_VERSION
          $PortableDir = "ps-analyzer-v$Version-portable"
          $TargetTriple = "x86_64-pc-windows-msvc"
          
          New-Item -ItemType Directory -Force -Path $PortableDir
          New-Item -ItemType Directory -Force -Path "$PortableDir/binaries"
          
          # 1. Main Application
          Copy-Item "src-tauri/target/release/ps-analyzer.exe" -Destination "$PortableDir/PS Analyzer.exe"
          
          # 2. Sidecars in 'binaries' (Long names, for Tauri)
          # Also copy all DLL dependencies here
          Copy-Item "src-tauri/binaries/*" -Destination "$PortableDir/binaries/"
          
          # 3. Sidecars in root (Short names, for Bio-Engine auto-discovery)
          # We rename them while copying to remove the target triple
          $Tools = @("bio-engine", "bgzip", "samtools", "tracy")
          foreach ($Tool in $Tools) {
              $LongName = "ps-analyzer-$Tool-$TargetTriple.exe"
              $ShortName = "ps-analyzer-$Tool.exe"
              if (Test-Path "src-tauri/binaries/$LongName") {
                  Copy-Item "src-tauri/binaries/$LongName" -Destination "$PortableDir/$ShortName"
              }
          }
          
          # 4. Portable marker
          New-Item -ItemType File -Path "$PortableDir/.portable" -Force
          
          # Create the ZIP
          Compress-Archive -Path "$PortableDir/*" -DestinationPath "ps-analyzer-v$Version-windows-portable.zip"
          
          echo "Portable ZIP created: ps-analyzer-v$Version-windows-portable.zip"

      - name: Upload Portable Zip
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ps-analyzer-*-windows-portable.zip
          tag_name: v${{ env.PACKAGE_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

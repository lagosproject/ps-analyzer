name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-frontend:
    name: Lint Angular Frontend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Frontend Dependencies
        run: npm install

      - name: Run Frontend Lint
        run: npm run lint

  check-backend:
    name: Check Rust Backend
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev jq

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Stub sidecar binaries
        working-directory: src-tauri
        run: |
          # tauri-build's build script validates that every externalBin resource
          # path exists on disk, even for `cargo check`. It doesn't need working
          # binaries here, just files with the right target-triple suffix.
          jq '.bundle.externalBin |= map(select(contains("bgzip") == false and contains("samtools") == false))' tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp tauri.conf.json
          mkdir -p binaries
          touch binaries/ps-analyzer-bio-engine-x86_64-unknown-linux-gnu
          touch binaries/ps-analyzer-tracy-x86_64-unknown-linux-gnu

      - name: Run cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

  publish-docker:
    name: Publish Web Image to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/lagosproject/ps-analyzer-web:latest
            ghcr.io/lagosproject/ps-analyzer-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

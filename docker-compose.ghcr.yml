services:
  backend:
    image: ghcr.io/lagosproject/bio-engine-server:latest
    environment:
      - BIO_HOST=0.0.0.0
      - BIO_PORT=8000
      - BIO_DATA_DIR=/app/storage
      - BIO_REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: always

  redis:
    image: mirror.gcr.io/library/redis:alpine
    volumes:
      - ./storage/redis:/data
    restart: always

  frontend:
    image: ghcr.io/lagosproject/ps-analyzer-web:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

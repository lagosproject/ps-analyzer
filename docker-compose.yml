services:
  backend:
    build:
      context: ../bio-engine
      dockerfile: Dockerfile.server
    environment:
      - BIO_HOST=0.0.0.0
      - BIO_PORT=8000
      - BIO_DATA_DIR=/app/storage
      - BIO_REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

services:
  backend:
    build:
      context: ../bio-engine
      dockerfile: Dockerfile.server
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${http_proxy}
        - https_proxy=${https_proxy}
        - no_proxy=${no_proxy}
    environment:
      - BIO_HOST=0.0.0.0
      - BIO_PORT=8000
      - BIO_DATA_DIR=/app/storage
      - BIO_REDIS_URL=redis://redis:6379/0
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: always

  redis:
    image: mirror.gcr.io/library/redis:alpine
    volumes:
      - ./storage/redis:/data
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
        - http_proxy=${http_proxy}
        - https_proxy=${https_proxy}
        - no_proxy=${no_proxy}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
